<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Melton - ???</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Distorted Image */
    .image {
      position: absolute;
      width: 100vw;
      height: 100vh;
      background-image: url("https://picsum.photos/900"); /* replace with your creepy face */
      background-size: cover;
      background-position: center;

      filter: contrast(300%) saturate(400%) hue-rotate(80deg) brightness(1.2);
      animation: glitch 0.15s infinite, shake 0.3s infinite;
    }

    /* Radioactive overlay */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle,
        rgba(255,255,0,0.6),
        rgba(255,0,0,0.6),
        rgba(0,0,0,0.9)
      );
      mix-blend-mode: screen;
      animation: pulse 1s infinite;
    }

    /* Red warning text */
    .warning {
      position: absolute;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      color: red;
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px darkred;

      animation: flicker 0.1s infinite, glitchText 0.2s infinite;
    }

    /* Scanlines */
    .scanlines {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0px,
        rgba(0,0,0,0.2) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
    }

    /* Animations */
    @keyframes glitch {
      0% { transform: skew(0deg); }
      25% { transform: skew(3deg); }
      50% { transform: skew(-3deg); }
      75% { transform: skew(2deg); }
      100% { transform: skew(0deg); }
    }

    @keyframes shake {
      0% { transform: translate(0,0); }
      25% { transform: translate(-3px,2px); }
      50% { transform: translate(3px,-2px); }
      75% { transform: translate(-2px,-3px); }
      100% { transform: translate(0,0); }
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    @keyframes glitchText {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0); }
    }
  </style>
</head>

<body>
  <div class="image"></div>
  <div class="overlay"></div>

  <div class="warning">
    YOU WILL HEAR THE LAUGHTER OF THOUSANDS<br>
    AS THE SKY OPENS UP
  </div>

  <div class="scanlines"></div>
</body>
</html>
